<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>経理書類アップロード｜是是</title>
  <style>
    :root { --accent:#2563eb; --bg:#f6f7f9; --line:#e3e6ea; --ink:#1f2430; --muted:#6b7280; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
           background:var(--bg); color:var(--ink); }
    .wrap { max-width:560px; margin:0 auto; padding:20px 16px 40px; }
    h1 { font-size:18px; margin:8px 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin:0 0 20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 16px; }
    label { display:block; font-size:13px; font-weight:600; margin:16px 0 6px; }
    label:first-of-type { margin-top:0; }
    .req { color:#dc2626; font-size:11px; margin-left:4px; }
    select, input[type=text] { width:100%; padding:13px 12px; font-size:16px; border:1px solid var(--line);
      border-radius:10px; background:#fff; color:var(--ink); appearance:none; }
    .file-zone { border:2px dashed #c7ccd3; border-radius:12px; padding:22px 12px; text-align:center;
                 color:var(--muted); font-size:14px; background:#fafbfc; }
    .file-zone input { display:none; }
    .file-btn { display:inline-block; margin-top:8px; background:var(--accent); color:#fff;
                padding:11px 18px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
    #fileList { margin:10px 0 0; font-size:13px; text-align:left; }
    #fileList div { padding:6px 10px; background:#eef2ff; border-radius:8px; margin-top:6px; }
    .seg { display:flex; gap:8px; }
    .seg button { flex:1; padding:13px; font-size:15px; font-weight:600; border:1px solid var(--line);
                  background:#fff; border-radius:10px; cursor:pointer; color:var(--ink); }
    .seg button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    #directionRow { display:none; }
    .submit { width:100%; margin-top:24px; padding:15px; font-size:16px; font-weight:700; color:#fff;
              background:var(--accent); border:none; border-radius:12px; cursor:pointer; }
    .submit:disabled { opacity:.5; }
    .msg { margin-top:16px; padding:14px; border-radius:10px; font-size:14px; white-space:pre-wrap; display:none; }
    .msg.ok { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .msg.ng { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .spin { display:inline-block; width:16px; height:16px; border:2px solid #fff; border-top-color:transparent;
            border-radius:50%; animation:s .7s linear infinite; vertical-align:-3px; margin-right:6px; }
    @keyframes s { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📂 経理書類アップロード（是是）</h1>
    <p class="sub">種類と「発行/受領」を選んでファイルを送るだけ。自動で正しいフォルダに保存されます。</p>

    <div class="card">
      <form id="f">
        <label>書類の種類 <span class="req">必須</span></label>
        <select id="category" required><option value="">選択してください</option></select>

        <div id="directionRow">
          <label>発行 / 受領 <span class="req">必須</span></label>
          <div class="seg">
            <button type="button" data-v="発行" onclick="pickDir(this)">発行（自社→取引先）</button>
            <button type="button" data-v="受領" onclick="pickDir(this)">受領（取引先→自社）</button>
          </div>
        </div>

        <label>取引先名 <span style="color:var(--muted);font-weight:400">（任意）</span></label>
        <input type="text" id="torihiki" placeholder="例）ハウスドゥ">

        <label>メモ <span style="color:var(--muted);font-weight:400">（任意）</span></label>
        <input type="text" id="memo" placeholder="例）6月分">

        <label>ファイル <span class="req">必須</span></label>
        <div class="file-zone">
          写真・PDFを選択（複数OK）
          <label class="file-btn">ファイルを選ぶ / 撮影
            <input type="file" id="files" accept="image/*,application/pdf" multiple onchange="showFiles()">
          </label>
          <div id="fileList"></div>
        </div>

        <button type="submit" class="submit" id="go">アップロード</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- GASへ確実に届ける隠しフォーム＋iフレーム（fetchを使わずCORSを回避） -->
  <iframe name="sink" id="sink" style="display:none"></iframe>
  <form id="gform" method="POST"
        action="PASTE_XEXE_GAS_EXEC_URL"
        target="sink" style="display:none">
    <input type="hidden" name="category" id="h_category">
    <input type="hidden" name="direction" id="h_direction">
    <input type="hidden" name="torihiki" id="h_torihiki">
    <input type="hidden" name="memo" id="h_memo">
    <input type="hidden" name="filename" id="h_filename">
    <input type="hidden" name="mimeType" id="h_mimeType">
    <input type="hidden" name="data" id="h_data">
  </form>

  <script>
    var CATS = [
      {label:'1.請求書',dir:true},{label:'2.領収書',dir:true},{label:'3.契約書',dir:true},
      {label:'4.通帳',dir:false},{label:'5.その他',dir:false}
    ];
    var dirMap = {}, direction = '';
    var sel = document.getElementById('category');
    CATS.forEach(function(c){ dirMap[c.label]=c.dir; var o=document.createElement('option'); o.value=c.label; o.textContent=c.label; sel.appendChild(o); });

    sel.addEventListener('change', function(){
      var need = dirMap[this.value]===true;
      document.getElementById('directionRow').style.display = need ? 'block':'none';
      if(!need){ direction=''; clearDir(); }
    });
    function pickDir(btn){ clearDir(); btn.classList.add('on'); direction=btn.getAttribute('data-v'); }
    function clearDir(){ var b=document.querySelectorAll('#directionRow .seg button'); for(var i=0;i<b.length;i++)b[i].classList.remove('on'); }
    function showFiles(){ var fs=document.getElementById('files').files, box=document.getElementById('fileList'); box.innerHTML='';
      for(var i=0;i<fs.length;i++){ var d=document.createElement('div'); d.textContent='📄 '+fs[i].name; box.appendChild(d); } }

    function toBase64(file){ return new Promise(function(res,rej){ var r=new FileReader();
      r.onload=function(){ res(String(r.result).split(',')[1]); }; r.onerror=rej; r.readAsDataURL(file); }); }

    // 隠しフォームをiフレームへPOST。iフレームのloadで完了を待つ（CORSの影響を受けない確実な方式）
    function postViaForm(v){
      return new Promise(function(resolve){
        var iframe=document.getElementById('sink'), settled=false;
        function finish(){ if(settled)return; settled=true; iframe.onload=null; resolve(); }
        iframe.onload=finish;
        document.getElementById('h_category').value=v.category;
        document.getElementById('h_direction').value=v.direction;
        document.getElementById('h_torihiki').value=v.torihiki;
        document.getElementById('h_memo').value=v.memo;
        document.getElementById('h_filename').value=v.filename;
        document.getElementById('h_mimeType').value=v.mimeType;
        document.getElementById('h_data').value=v.data;
        document.getElementById('gform').submit();
        setTimeout(finish, 12000); // 念のためのフォールバック
      });
    }

    document.getElementById('f').addEventListener('submit', async function(e){
      e.preventDefault();
      var msg=document.getElementById('msg'), btn=document.getElementById('go');
      var cat=sel.value, files=document.getElementById('files').files;
      if(!cat) return flash(msg,'ng','種類を選択してください');
      if(dirMap[cat]===true && !direction) return flash(msg,'ng','「発行」か「受領」を選択してください');
      if(!files.length) return flash(msg,'ng','ファイルを選択してください');

      btn.disabled=true; btn.innerHTML='<span class="spin"></span>送信中…';
      try {
        for(var i=0;i<files.length;i++){
          var b64=await toBase64(files[i]);
          await postViaForm({
            category:cat, direction:direction,
            torihiki:document.getElementById('torihiki').value,
            memo:document.getElementById('memo').value,
            filename:files[i].name, mimeType:files[i].type||'application/octet-stream',
            data:b64
          });
        }
        flash(msg,'ok','✅ '+files.length+'件を送信しました。数秒でGoogleドライブに保存されます。');
        document.getElementById('f').reset(); showFiles(); clearDir(); direction='';
        document.getElementById('directionRow').style.display='none';
      } catch(err){ flash(msg,'ng','送信エラー: '+err.message); }
      btn.disabled=false; btn.textContent='アップロード';
    });
    function flash(el,cls,t){ el.className='msg '+cls; el.textContent=t; el.style.display='block'; window.scrollTo(0,document.body.scrollHeight); }
  </script>
</body>
</html>
