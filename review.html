<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未振り分けボックス｜両足院・是是</title>
  <style>
    :root { --accent:#2563eb; --bg:#f6f7f9; --line:#e3e6ea; --ink:#1f2430; --muted:#6b7280; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
           background:var(--bg); color:var(--ink); }
    .wrap { max-width:620px; margin:0 auto; padding:20px 16px 40px; }
    h1 { font-size:18px; margin:8px 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin:0 0 18px; }
    .back { color:var(--muted); font-size:13px; text-decoration:none; }
    .empty, .loading { background:#fff; border:1px solid var(--line); border-radius:14px; padding:30px; text-align:center; color:var(--muted); }
    .item { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 14px 16px; margin-bottom:14px; }
    .fname { font-size:14px; font-weight:700; word-break:break-all; }
    .fname a { color:var(--accent); }
    .desc { font-size:12px; color:var(--muted); white-space:pre-wrap; margin:6px 0 10px; word-break:break-all; }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    select, input[type=text] { padding:11px 10px; font-size:16px; border:1px solid var(--line); border-radius:9px; flex:1; min-width:130px; appearance:none; background:#fff; color:var(--ink); }
    .seg { display:flex; gap:6px; margin-top:8px; }
    .seg button { flex:1; padding:10px; font-size:14px; border:1px solid var(--line); background:#fff; border-radius:9px; cursor:pointer; color:var(--ink); }
    .seg button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    .dirRow { display:none; }
    .go { margin-top:10px; width:100%; padding:12px; font-size:15px; font-weight:700; color:#fff; background:var(--accent); border:none; border-radius:10px; cursor:pointer; }
    .go:disabled { opacity:.5; }
    .r { font-size:13px; margin-top:8px; white-space:pre-wrap; }
    .r.ok { color:#065f46; } .r.ng { color:#991b1b; }
    .reload { margin:0 0 14px; padding:9px 14px; font-size:13px; border:1px solid var(--line); background:#fff; border-radius:9px; cursor:pointer; color:var(--ink); }
    .spin { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:6px; }
    @keyframes s { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./">&larr; アップロード画面へ</a>
    <h1>🟡 未振り分けボックス <span id="orgName"></span></h1>
    <p class="sub">AIが判別できなかった書類です。種類と発行/受領を選んで「このフォルダへ移動」を押すと、正しいフォルダへ移動・リネームされます。</p>
    <div class="seg" id="orgSeg" style="margin:0 0 12px;">
      <button type="button" data-org="ryosokuin" onclick="pickOrg('ryosokuin')">両足院</button>
      <button type="button" data-org="xexe" onclick="pickOrg('xexe')">是是</button>
    </div>
    <button class="reload" onclick="load()">🔄 一覧を更新</button>
    <div id="list"><div class="loading">読み込み中…</div></div>
  </div>

  <script>
    // credentials:'omit' が肝。Cookieを送らず匿名としてGASにアクセスするので、
    // Googleの「複数ログインでGASページが開けない」バグの影響を受けない。
    var ORGS = {
      ryosokuin: { label: '両足院', url: 'https://script.google.com/macros/s/AKfycbwQep9Mp-tI-EuTwpn1pe7aoRy9_LZD7LU1zlONLUay8hoyFz4ItwdrMcbV230ttval/exec' },
      xexe:      { label: '是是',   url: 'https://script.google.com/macros/s/AKfycbxDhprWdltkn-6nQDHPW3S9YbYDg4NSlEFVndpTwYSQDUw-i86MKxGZcOEpoMHF2uUHzw/exec' }
    };
    var org = new URLSearchParams(location.search).get('org') || localStorage.getItem('keiri_org') || 'ryosokuin';
    if (!ORGS[org]) org = 'ryosokuin';
    function GAS_URL_() { return ORGS[org].url; }
    function pickOrg(o) {
      org = o;
      try { localStorage.setItem('keiri_org', o); } catch (e) {}
      document.querySelectorAll('#orgSeg button').forEach(function (b) {
        b.classList.toggle('on', b.getAttribute('data-org') === o);
      });
      document.getElementById('orgName').textContent = '（' + ORGS[o].label + '）';
      load();
    }
    var CATS = [], DIRMAP = {}, state = {};

    function apiGet(params) {
      return fetch(GAS_URL_() + '?' + params, { credentials: 'omit' }).then(function(r){ return r.json(); });
    }
    function apiPost(fields) {
      return fetch(GAS_URL_(), { method: 'POST', credentials: 'omit', body: new URLSearchParams(fields) })
        .then(function(r){ return r.json(); });
    }

    function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    function load() {
      var box = document.getElementById('list');
      box.innerHTML = '<div class="loading">読み込み中…</div>';
      apiGet('action=list').then(function(data){
        if (!data.ok) throw new Error('APIエラー');
        CATS = data.categories; DIRMAP = {};
        CATS.forEach(function(c){ DIRMAP[c.label] = c.direction; });
        render(data.unsorted);
      }).catch(function(e){
        box.innerHTML = '<div class="empty">⚠️ 読み込みに失敗しました（' + esc(e.message) + '）。「一覧を更新」を押してください。</div>';
      });
    }

    function render(items) {
      var box = document.getElementById('list');
      state = {};
      if (!items.length) { box.innerHTML = '<div class="empty">✅ 未振り分けはありません。</div>'; return; }
      box.innerHTML = items.map(function(u, i){
        var opts = CATS.map(function(c){ return '<option value="' + esc(c.label) + '">' + esc(c.label) + '</option>'; }).join('');
        return '<div class="item" id="item-' + i + '">' +
          '<div class="fname">📄 <a href="' + esc(u.url) + '" target="_blank" rel="noopener">' + esc(u.name) + '</a></div>' +
          (u.desc ? '<div class="desc">' + esc(u.desc) + '</div>' : '') +
          '<div class="row">' +
            '<select onchange="onCat(this,' + i + ')"><option value="">種類を選択</option>' + opts + '</select>' +
            '<input type="text" id="tori-' + i + '" placeholder="取引先（任意）">' +
          '</div>' +
          '<div class="dirRow" id="dir-' + i + '"><div class="seg">' +
            '<button type="button" onclick="pickDir(this,' + i + ',\'発行\')">発行</button>' +
            '<button type="button" onclick="pickDir(this,' + i + ',\'受領\')">受領</button>' +
          '</div></div>' +
          '<button class="go" id="go-' + i + '" onclick="sortIt(' + i + ',\'' + esc(u.id) + '\')">このフォルダへ移動</button>' +
          '<div class="r" id="r-' + i + '"></div>' +
        '</div>';
      }).join('');
    }

    function onCat(sel, i) {
      state['cat' + i] = sel.value;
      var need = DIRMAP[sel.value] === true;
      document.getElementById('dir-' + i).style.display = need ? 'block' : 'none';
      if (!need) { state['dir' + i] = ''; clearSeg(i); }
    }
    function pickDir(btn, i, v) { clearSeg(i); btn.classList.add('on'); state['dir' + i] = v; }
    function clearSeg(i) { document.querySelectorAll('#dir-' + i + ' button').forEach(function(b){ b.classList.remove('on'); }); }

    function sortIt(i, fileId) {
      var cat = state['cat' + i] || '';
      var dir = state['dir' + i] || '';
      var r = document.getElementById('r-' + i);
      if (!cat) { r.className = 'r ng'; r.textContent = '種類を選択してください'; return; }
      if (DIRMAP[cat] === true && !dir) { r.className = 'r ng'; r.textContent = '発行/受領を選択してください'; return; }
      var btn = document.getElementById('go-' + i);
      btn.disabled = true; btn.innerHTML = '<span class="spin"></span>移動中…';
      apiPost({
        action: 'sort', fileId: fileId, category: cat, direction: dir,
        torihiki: document.getElementById('tori-' + i).value, memo: ''
      }).then(function(res){
        if (res.ok) {
          r.className = 'r ok'; r.textContent = res.message;
          document.getElementById('item-' + i).style.opacity = .4;
          btn.textContent = '完了';
        } else {
          r.className = 'r ng'; r.textContent = res.message || 'エラーが発生しました';
          btn.disabled = false; btn.textContent = 'このフォルダへ移動';
        }
      }).catch(function(e){
        r.className = 'r ng'; r.textContent = '通信エラー: ' + e.message;
        btn.disabled = false; btn.textContent = 'このフォルダへ移動';
      });
    }

    pickOrg(org);
  </script>
</body>
</html>
